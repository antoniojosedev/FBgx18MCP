name: Release

on:
  release:
    # `edited` / `released` let a late `gh release upload publish.zip` re-trigger
    # this workflow when the asset was missing on first publish.
    types: [published, released, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)publish (e.g. v2.6.6)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            echo "::error::No release tag resolved from event or workflow_dispatch input."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11.16.0
          npm --version

      - name: Resolve package metadata
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ steps.tag.outputs.tag }}"
          EXPECTED="v$VERSION"
          if [[ "$TAG" != "$EXPECTED" ]]; then
            echo "::error::Release tag $TAG does not match package.json version $EXPECTED."
            exit 1
          fi
          echo "name=$NAME"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm registry
        id: npm_check
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Already on npm; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download publish.zip from Release
        if: steps.npm_check.outputs.already_published == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # v2.6.8: spell out the contract so a missing asset gives an actionable
          # message instead of `gh release download`'s cryptic "no assets to
          # download". The asset has to be produced locally (the Worker
          # references Artech.* DLLs from a GeneXus 18 install which the
          # ubuntu runner doesn't have) — release.ps1 automates the full
          # sequence: build → zip → tag → push → gh release create with asset.
          if ! gh release view "${{ steps.tag.outputs.tag }}" \
                --json assets --jq '.assets[].name' | grep -qx 'publish.zip'; then
            echo "::error title=publish.zip missing::Release ${{ steps.tag.outputs.tag }} has no publish.zip asset. Use ./release.ps1 to create releases (builds + zips + uploads in one step), or run 'gh release upload ${{ steps.tag.outputs.tag }} publish.zip' from a machine that has the Worker artefacts."
            exit 1
          fi
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern publish.zip \
            --dir .

      - name: Verify publish.zip integrity
        if: steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # Read the SHA-256 committed at the tag (written by release.ps1 before tagging).
          SHA_FILE="publish.zip.sha256"
          if [[ ! -f "$SHA_FILE" ]]; then
            echo "::warning::$SHA_FILE not found at tag ${{ steps.tag.outputs.tag }} — skipping integrity check (pre-v2.9.2 release)."
          else
            EXPECTED=$(awk '{print $1}' "$SHA_FILE")
            ACTUAL=$(sha256sum publish.zip | awk '{print $1}')
            if [[ "$ACTUAL" != "$EXPECTED" ]]; then
              echo "::error::publish.zip SHA-256 mismatch. Expected: $EXPECTED  Got: $ACTUAL"
              echo "::error::The binary was not produced by the tagged commit. Re-run release.ps1 on the correct commit."
              exit 1
            fi
            echo "Integrity check passed: $ACTUAL"
          fi

      - name: Unpack publish/
        if: steps.npm_check.outputs.already_published == 'false'
        run: |
          set -euo pipefail
          mkdir -p publish
          unzip -q publish.zip -d publish
          test -f publish/GxMcp.Gateway.exe || { echo "::error::GxMcp.Gateway.exe missing in publish.zip"; exit 1; }
          test -f publish/worker/GxMcp.Worker.exe || { echo "::error::worker/GxMcp.Worker.exe missing in publish.zip"; exit 1; }
          # Task 4: assert tool_definitions.json is present (version consistency validated by release.ps1)
          test -f publish/tool_definitions.json || { echo "::error::publish/tool_definitions.json missing in publish.zip — rebuild with release.ps1"; exit 1; }

      - name: Install dependencies
        if: steps.npm_check.outputs.already_published == 'false'
        run: npm install

      - name: Enforce OIDC-only npm auth
        if: steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN NPM_TOKEN
          if [[ -n "${NPM_CONFIG_USERCONFIG:-}" && -f "${NPM_CONFIG_USERCONFIG}" ]]; then
            sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG}" || true
          fi
          OIDC_NPMRC="$RUNNER_TEMP/npmrc-oidc"
          {
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=false"
          } > "$OIDC_NPMRC"
          echo "NPM_CONFIG_USERCONFIG=$OIDC_NPMRC" >> "$GITHUB_ENV"

      - name: Publish to npm with provenance
        if: steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --access public --provenance
