name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 8.0.x

      - name: Install npm deps
        run: npm install

      - name: CLI tests
        run: npm test

      - name: Install Nexus IDE deps
        working-directory: src/nexus-ide
        run: npm ci

      - name: Nexus IDE compile
        working-directory: src/nexus-ide
        run: npm run compile

      - name: Nexus IDE tests
        working-directory: src/nexus-ide
        run: npm test

      - name: Gateway and Worker coverage
        shell: pwsh
        run: |
          ./scripts/coverage/collect.ps1 -OutputRoot "$env:RUNNER_TEMP\gx-coverage-artifacts"
          ./scripts/coverage/assert-threshold.ps1 -CoverageRoot "$env:RUNNER_TEMP\gx-coverage-artifacts" -MinLineRatePercent 50

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gateway-worker-coverage
          path: ${{ runner.temp }}\gx-coverage-artifacts

      - name: LLM contract smoke
        shell: pwsh
        run: ./scripts/mcp_llm_contract_smoke.ps1
