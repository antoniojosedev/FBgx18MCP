name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install npm deps
        run: npm install

      - name: CLI tests
        run: npm test

      - name: Install Nexus IDE deps
        working-directory: src/nexus-ide
        run: npm ci

      - name: Nexus IDE compile
        working-directory: src/nexus-ide
        run: npm run compile

      - name: Nexus IDE tests
        working-directory: src/nexus-ide
        run: npm test

      - name: Gateway tests
        shell: pwsh
        run: |
          dotnet test src/GxMcp.Gateway.Tests/GxMcp.Gateway.Tests.csproj -v minimal -p:BaseOutputPath="$env:RUNNER_TEMP\gx-gateway-tests\"

      - name: Worker tests
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\GeneXus\GeneXus18\Artech.Architecture.Common.dll") {
            dotnet test src/GxMcp.Worker.Tests/GxMcp.Worker.Tests.csproj -v minimal -p:BaseOutputPath="$env:RUNNER_TEMP\gx-worker-tests\"
          } else {
            Write-Host "GeneXus 18 SDK not installed on runner; skipping Worker.Tests."
          }

      - name: LLM contract smoke
        shell: pwsh
        run: ./scripts/mcp_llm_contract_smoke.ps1
